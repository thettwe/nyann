# nyann Governance Check
# Generated by bin/gen-ci.sh --governance from the project's nyann profile.
# Runs drift + health-score checks on every PR and posts a summary comment.

name: Governance

on:
  pull_request:
    branches: [${BASE_BRANCHES}]
${PATH_FILTERS}
permissions:
  contents: read
  pull-requests: write

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install nyann
        run: |
          git clone --depth 1 --branch v${NYANN_VERSION:-1.3.0} https://github.com/thettweaung/nyann.git /tmp/nyann

      - name: Install jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          fi

      - name: Resolve profile
        id: profile
        run: |
          NYANN=/tmp/nyann
          PROFILE_NAME="default"
          if [ -f .nyann/profile ]; then
            PROFILE_NAME=$(cat .nyann/profile | tr -d '[:space:]')
            if ! echo "$PROFILE_NAME" | grep -qE '^[a-z0-9][a-z0-9-]*$'; then
              echo "::warning::Invalid profile name '${PROFILE_NAME}', falling back to default"
              PROFILE_NAME="default"
            fi
          fi
          PROFILE_PATH="${NYANN}/profiles/${PROFILE_NAME}.json"
          if [ ! -f "$PROFILE_PATH" ]; then
            echo "::warning::Profile '${PROFILE_NAME}' not found, falling back to default"
            PROFILE_PATH="${NYANN}/profiles/default.json"
          fi
          echo "path=${PROFILE_PATH}" >> "$GITHUB_OUTPUT"
          echo "name=${PROFILE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run governance gate
        id: gate
        run: |
          NYANN=/tmp/nyann
          bash "${NYANN}/bin/doctor-ci.sh" \
            --target . \
            --profile "${{ steps.profile.outputs.path }}" \
            --annotations \
            --comment-file /tmp/governance-comment.md \
            > /tmp/governance-result.json 2>/tmp/governance-stderr.log || GATE_EXIT=$?
          echo "exit_code=${GATE_EXIT:-0}" >> "$GITHUB_OUTPUT"
          cat /tmp/governance-result.json

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/governance-comment.md ]; then
            EXISTING=$(gh pr view "${{ github.event.pull_request.number }}" \
              --json comments --jq '.comments[] | select(.body | startswith("## ")) | select(.body | contains("nyann governance")) | .url' \
              2>/dev/null | head -1 || true)
            if [ -n "$EXISTING" ]; then
              COMMENT_ID=$(basename "$EXISTING")
              gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
                -X PATCH -f body="$(cat /tmp/governance-comment.md)" 2>/dev/null || \
              gh pr comment "${{ github.event.pull_request.number }}" \
                --body-file /tmp/governance-comment.md
            else
              gh pr comment "${{ github.event.pull_request.number }}" \
                --body-file /tmp/governance-comment.md
            fi
          fi

      - name: Enforce gate
        if: always()
        run: |
          EXIT="${{ steps.gate.outputs.exit_code }}"
          if [ "$EXIT" != "0" ]; then
            echo "::error::Governance gate failed (exit ${EXIT}). Run /nyann:doctor locally for details."
            exit 1
          fi
