# nyann CI workflow — TypeScript
# Generated by bin/gen-ci.sh from the project's nyann profile.
# Edit freely outside the marker comments; regeneration replaces only
# the region between # nyann:ci:start / # nyann:ci:end.

name: CI

on:
  push:
    branches: [${BASE_BRANCHES}]
${PATH_FILTERS}  pull_request:
    branches: [${BASE_BRANCHES}]
${PATH_FILTERS}
jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [${NODE_VERSION}]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install ${PACKAGE_MANAGER} (if pnpm)
        if: ${{ '${PACKAGE_MANAGER}' == 'pnpm' }}
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: ${INSTALL_CMD}

      - name: Lint
        run: ${LINT_CMD}

      - name: Type check
        run: ${TYPECHECK_CMD}

      - name: Test
        run: ${TEST_CMD}
