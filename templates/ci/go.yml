# nyann CI workflow — Go
# Generated by bin/gen-ci.sh from the project's nyann profile.

name: CI

on:
  push:
    branches: [${BASE_BRANCHES}]
${PATH_FILTERS}  pull_request:
    branches: [${BASE_BRANCHES}]
${PATH_FILTERS}
jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [${GO_VERSION}]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test -v -race ./...
