name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Only one CI run per branch at a time — no untrusted input in run: commands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN. CI only reads source — no PRs, releases,
# or issue mutations from this workflow.
permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint + bats
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      # Pinned to commit SHA (not @v6) — floating tags can be re-pointed
      # by a compromised maintainer (cf. tj-actions/changed-files 2025).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pin shellcheck to an exact release rather than trusting whatever the
      # runner image ships. The pre-installed version drifts between image
      # refreshes, and a newer/older shellcheck can flag (or stop flagging)
      # rules that `tests/lint.sh` passes locally — a green local run then
      # fails CI for reasons unrelated to the change. Installing a pinned
      # binary and prepending it to PATH makes the lint gate reproducible
      # and identical to the version maintainers run locally.
      - name: Install pinned shellcheck
        shell: bash
        env:
          # Keep in sync with the version maintainers run locally (see
          # tests/lint.sh header). Bump deliberately, not implicitly.
          SHELLCHECK_VERSION: v0.11.0
        run: |
          set -euo pipefail
          case "$(uname -s)" in
            Linux)  os=linux ;;
            Darwin) os=darwin ;;
            *) echo "unsupported OS: $(uname -s)"; exit 1 ;;
          esac
          case "$(uname -m)" in
            x86_64|amd64)  arch=x86_64 ;;
            arm64|aarch64) arch=aarch64 ;;
            *) echo "unsupported arch: $(uname -m)"; exit 1 ;;
          esac
          asset="shellcheck-${SHELLCHECK_VERSION}.${os}.${arch}.tar.gz"
          url="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/${asset}"
          dest="$HOME/.shellcheck-bin"
          mkdir -p "$dest"
          curl -fsSL "$url" -o /tmp/shellcheck.tar.gz
          tar -xzf /tmp/shellcheck.tar.gz -C /tmp
          install -m 0755 "/tmp/shellcheck-${SHELLCHECK_VERSION}/shellcheck" "$dest/shellcheck"
          # Prepend to PATH for all subsequent steps so it wins over any
          # shellcheck baked into the runner image.
          echo "$dest" >> "$GITHUB_PATH"
          "$dest/shellcheck" --version

      - name: Install bats + jq (ubuntu)
        if: runner.os == 'Linux'
        run: |
          # Only install what's actually missing — GitHub-hosted runners
          # already have jq, and a repeat apt pulls-in an update loop.
          # shellcheck is pinned in a dedicated step above.
          need=()
          for pkg in bats jq; do
            command -v "$pkg" >/dev/null 2>&1 || need+=("$pkg")
          done
          if (( ${#need[@]} > 0 )); then
            sudo apt-get update
            sudo apt-get install -y "${need[@]}"
          fi

      - name: Install bats + jq (macOS)
        if: runner.os == 'macOS'
        run: |
          # macOS ships bash 3.2 which has no `declare -A`; parallel
          # arrays keep this step portable. `bats` is packaged as
          # bats-core on brew. shellcheck is pinned in a dedicated step above.
          tools=(bats jq)
          formulas=(bats-core jq)
          need=()
          for i in "${!tools[@]}"; do
            command -v "${tools[$i]}" >/dev/null 2>&1 \
              || need+=("${formulas[$i]}")
          done
          if (( ${#need[@]} > 0 )); then
            brew install "${need[@]}"
          fi

      - name: Install PyYAML (for pre-commit config merge + MCP detector)
        run: |
          # Skip if PyYAML is already importable.
          python3 -c "import yaml" 2>/dev/null && exit 0
          python3 -m pip install --user --break-system-packages PyYAML || \
            python3 -m pip install --user PyYAML

      # Pinned (vs `curl | sh` of astral.sh) — the official action ships
      # SHA-verified release tarballs, removing the ambient curl-pipe-bash
      # supply-chain step. SHA matches v8.1.0.
      - name: Install uv (for schema validation via uvx check-jsonschema)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Show tool versions
        run: |
          bash --version | head -1
          shellcheck --version | head -2
          bats --version
          jq --version
          uvx --version || true
          python3 --version

      - name: Lint (shellcheck + SKILL length)
        run: ./tests/lint.sh

      - name: Bats
        run: bats tests/bats

      # The output-quality eval tier is deterministic (runs bin/ scripts
      # end-to-end against fixtures, no live model) so it gates the merge.
      # The trigger-case tier needs a live LLM and is reported as a
      # skipped-with-reason by run.sh — it does not affect the exit code.
      - name: Output-quality evals
        run: |
          set -e
          for f in evals/*.evals.json; do
            echo "::group::$(basename "$f")"
            ./evals/run.sh --file "$f"
            echo "::endgroup::"
          done

      # A malformed plugin/marketplace manifest passes lint+bats but breaks
      # at install time. Validate structure here so CI catches it first.
      - name: Validate plugin manifest
        run: bash tests/validate-manifest.sh
